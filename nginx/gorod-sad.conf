# Город-сад — nginx reverse proxy на Next.js (web) + FastAPI (api)
#
# Положить на сервере в:  /etc/nginx/sites-available/gorod-sad
# Включить:  ln -s /etc/nginx/sites-available/gorod-sad /etc/nginx/sites-enabled/
# Проверить: nginx -t && systemctl reload nginx
# SSL:       certbot --nginx -d gorod-sad.pro -d www.gorod-sad.pro

server {
    listen 80;
    listen [::]:80;
    server_name gorod-sad.pro www.gorod-sad.pro;

    # certbot подменит этот блок после выпуска SSL
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # API — отдельный префикс
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Всё остальное — Next.js (фронт)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    client_max_body_size 25M;
}
