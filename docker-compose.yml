# Город-сад — продакшен-стек на одном compose-файле.
# Использует .env (рядом с этим файлом) для секретов и настроек.
# Запуск на сервере:
#   docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      - leads_data:/data
    ports:
      - "127.0.0.1:8000:8000"

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    restart: unless-stopped
    depends_on:
      - api
    env_file: .env
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  pg_data:
  leads_data:
